services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      DOUBAO_APP_ID: ${DOUBAO_APP_ID:-}
      DOUBAO_APP_KEY: ${DOUBAO_APP_KEY:-}
      DOUBAO_ACCESS_KEY: ${DOUBAO_ACCESS_KEY:-}
      DOUBAO_AST_RESOURCE_ID: ${DOUBAO_AST_RESOURCE_ID:-volc.service_type.10053}
      DOUBAO_AST_MODEL_ID: ${DOUBAO_AST_MODEL_ID:-}
      DOUBAO_AUC_RESOURCE_ID: ${DOUBAO_AUC_RESOURCE_ID:-volc.bigasr.auc_turbo}
      DATABASE_URL: /app/runtime/agent-dance.db
      UPLOAD_DIR: /app/uploads
      HTTP_ADDR: :8080
      HTTP_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8080:8080"
    volumes:
      - backend-runtime:/app/runtime
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_HTTP_URL: http://localhost:8080
        NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

volumes:
  backend-runtime:
  backend-uploads:
